<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Attari Classes CI/CD Demo</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f7fb;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background: #ffffff;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
      text-align: center;
      max-width: 700px;
      width: 90%;
    }

    h1 {
      color: #0d47a1;
      margin-bottom: 10px;
    }

    h2 {
      color: #333;
      font-weight: normal;
      margin-bottom: 30px;
    }

    .flow {
      font-size: 1.3rem;
      font-weight: bold;
      color: #1565c0;
      background: #e3f2fd;
      padding: 15px;
      border-radius: 8px;
      margin: 20px 0;
    }

    p {
      color: #555;
      line-height: 1.6;
    }

    footer {
      margin-top: 30px;
      color: #777;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Attari Classes</h1>
    <h2>AWS CI/CD Demo</h2>

    <div class="flow">
      GitHub → CodePipeline → CodeBuild → S3
    </div>

    <p>
      This is a simple static website hosted on Amazon S3 and deployed
      automatically using an AWS CI/CD pipeline.
    </p>

    <footer>
      © 2026 Attari Classes
    </footer>
  </div>
</body>
</html>
